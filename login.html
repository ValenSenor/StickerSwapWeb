<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - StickerSwap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1800ad;
            --secondary: #00bf63;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-y: auto;
            padding: 40px 0;
        }

        /* Fondo decorativo igual al hero */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 191, 99, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 191, 99, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 0 20px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .login-logo h1 {
            color: var(--secondary);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-top: 10px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 191, 99, 0.35);
            border-radius: 24px;
            padding: 40px 36px;
        }

        .login-card h2 {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 28px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--secondary);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(0, 191, 99, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-size: 13px;
        }

        .form-group input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 16px rgba(0, 191, 99, 0.25);
        }

        .btn-ingresar {
            width: 100%;
            margin-top: 10px;
            background: var(--secondary);
            color: var(--primary);
            border: none;
            border-radius: 50px;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-ingresar:hover {
            background: #00d67a;
            box-shadow: 0 0 24px rgba(0, 191, 99, 0.5);
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--secondary);
        }

        .error-msg {
            background: rgba(255, 60, 60, 0.15);
            border: 1px solid rgba(255, 60, 60, 0.5);
            color: #ff6b6b;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .btn-ingresar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-logo">
            <img src="assets/logo.png" alt="StickerSwap Logo">
            <h1>StickerSwap</h1>
        </div>

        <div class="login-card">
            <h2>Iniciar sesión</h2>

            <form id="login-form" novalidate>
                <div class="error-msg" id="error-msg"></div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn-ingresar">Ingresar</button>
            </form>
        </div>

        <a href="index.html" class="back-link">← Volver al inicio</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = 'https://pmodotofheuvamkfnwem.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtb2RvdG9maGV1dmFta2Zud2VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTUwNDE1ODQsImV4cCI6MjA3MDYxNzU4NH0.W4zGbx1d9QT3FNtGXG6b1L4-BiqFbxEOxPfp22uDbH4';

        const { createClient } = window.supabase;
        const sbClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const btnIngresar = form.querySelector('.btn-ingresar');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Por favor completá todos los campos.');
                return;
            }

            btnIngresar.disabled = true;
            btnIngresar.textContent = 'Ingresando...';
            errorMsg.style.display = 'none';

            try {
                const { data, error } = await sbClient.auth.signInWithPassword({ email, password });

                if (error) {
                    const msg = error.message.includes('Invalid login credentials')
                        ? 'Email o contraseña incorrectos.'
                        : error.message;
                    showError(msg);
                    return;
                }

                // Login exitoso → redirigir al dashboard
                window.location.href = 'dashboard.html';
            } catch (err) {
                showError('Error de conexión. Intentá de nuevo.');
            } finally {
                btnIngresar.disabled = false;
                btnIngresar.textContent = 'Ingresar';
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
    </script>

</body>
</html>
