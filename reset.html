<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña | StickerSwap</title>
    <style>
        body { 
            background: #1800ad; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
            text-align: center;
        }
        .btn { 
            background: #00bf63; 
            color: white; 
            padding: 15px 25px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            margin-top: 20px; 
            display: inline-block;
        }
        .logo { 
            width: 150px; 
            margin-bottom: 20px; 
        }
        .debug { 
            margin-top: 20px; 
            padding: 10px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 5px; 
            font-size: 11px; 
            word-break: break-all;
            max-width: 90%;
        }
    </style>
</head>
<body>
    <img src="assets/logo.png" alt="StickerSwap Logo" class="logo">
    <h2>Restableciendo tu contraseña...</h2>
    <p id="message">Tocá el botón para abrir StickerSwap</p>
    
    <a id="app-link" href="#" class="btn">Abrir StickerSwap</a>
    
    <div id="debug-info" class="debug" style="display: none;"></div>

    <script>
        // Obtener el hash de la URL (#access_token=...&type=recovery)
        const hash = window.location.hash;
        const debugDiv = document.getElementById('debug-info');
        
        if (hash && hash.length > 1) {
            // Remover el # inicial
            const hashWithoutSymbol = hash.substring(1);
            
            // Convertir el hash en query params para iOS
            // De: stickerswap://reset-password#access_token=abc
            // A:  stickerswap://reset-password?access_token=abc
            const appUrl = "stickerswap://reset-password?" + hashWithoutSymbol;
            
            // Mostrar info de debug
            debugDiv.innerHTML = "URL generada:<br>" + appUrl;
            debugDiv.style.display = 'block';
            
            // Actualizar el botón
            const appLink = document.getElementById('app-link');
            appLink.href = appUrl;
            
            // Función para intentar abrir la app
            function tryOpenApp() {
                // Método 1: Cambiar location directamente
                window.location.href = appUrl;
                
                // Método 2: Si no funciona después de 1 segundo, mostrar instruciones
                setTimeout(() => {
                    document.getElementById('message').innerText = 
                        "Si la app no se abrió, toca el botón nuevamente";
                }, 1000);
            }
            
            // Listener del botón
            appLink.addEventListener('click', function(e) {
                e.preventDefault();
                tryOpenApp();
            });
            
            // Intentar abrir automáticamente después de un breve delay
            setTimeout(() => {
                tryOpenApp();
            }, 500);
            
        } else {
            document.querySelector('h2').innerText = "Enlace inválido";
            document.getElementById('message').innerText = 
                "El enlace no contiene la información necesaria. Por favor, solicita un nuevo correo desde la aplicación.";
            document.getElementById('app-link').style.display = 'none';
            debugDiv.innerHTML = "Hash no encontrado en URL";
            debugDiv.style.display = 'block';
        }
    </script>
</body>
</html>
