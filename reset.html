<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña | StickerSwap</title>
    <style>
        body { background: #1800ad; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .btn { background: #00bf63; color: white; padding: 15px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        .logo { width: 150px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <img src="assets/logo.png" alt="StickerSwap Logo" class="logo">
    <h2>Restableciendo tu contraseña...</h2>
    <p>Si no eres redirigido automáticamente, toca el botón de abajo.</p>
    
    <a id="app-link" href="#" class="btn">Abrir StickerSwap</a>

    <script>
        // 1. Obtenemos el hash de la URL que manda Supabase (#access_token=...)
        const hash = window.location.hash;

        if (hash) {
            // 2. Definimos el esquema de Deep Link
            const appUrl = "stickerswap://reset-password" + hash;
            
            // 3. Actualizamos el botón primero
            const appLink = document.getElementById('app-link');
            appLink.href = appUrl;
            
            // 4. Intentamos abrir la app con un click en el botón después de un pequeño delay
            setTimeout(() => {
                // Crear un iframe oculto para intentar abrir la app (mejor compatibilidad en iOS)
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = appUrl;
                document.body.appendChild(iframe);
                
                // Limpiar el iframe después de un momento
                setTimeout(() => {
                    document.body.removeChild(iframe);
                }, 1000);
            }, 100);
            
            // 5. Agregar listener al botón para intentar nuevamente
            appLink.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = appUrl;
                
                // Si después de 2 segundos sigue aquí, mostrar mensaje de ayuda
                setTimeout(() => {
                    document.querySelector('h2').innerText = "¿No se abrió la app?";
                    document.querySelector('p').innerText = "Asegúrate de tener StickerSwap instalada. Si el problema persiste, copia el enlace de abajo y ábrelo en tu navegador:";
                    
                    // Mostrar el enlace para copiar
                    const copyDiv = document.createElement('div');
                    copyDiv.style.cssText = 'margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; word-break: break-all; font-size: 12px;';
                    copyDiv.innerText = appUrl;
                    document.body.appendChild(copyDiv);
                }, 2000);
            });
        } else {
            document.querySelector('h2').innerText = "Enlace inválido";
            document.querySelector('p').innerText = "Por favor, solicita un nuevo correo desde la aplicación.";
        }
    </script>
</body>
</html>
